# IClude 配置文件

storage:
  sqlite:
    enabled: true
    path: "./data/iclude.db"
    search:
      bm25_weights:
        content: 10.0    # 正文权重
        abstract: 5.0    # 摘要权重
        summary: 3.0     # 概述权重
    tokenizer:
      provider: "simple"           # noop(不分词) | simple(内置Unicode分词) | gse(原生Go分词) | jieba(结巴HTTP服务)
      jieba_url: "http://localhost:8866"  # 仅 provider=jieba 时需要
  qdrant:
    enabled: false
    url: "http://localhost:6333"
    collection: "memories"
    dimension: 384

partitions:
  enabled: false
  catalog_path: "./data/partitions.db"  # 分区目录库

llm:  # 多轮检索所需
  default_provider: "openai"
  openai:
    api_key: "${OPENAI_API_KEY}"
    base_url: ""  # 留空使用 OpenAI 默认，可改为兼容 API 地址 / Empty uses OpenAI default, can be set to compatible API URL
    model: "gpt-4"
  embedding:
    provider: "openai"               # openai | ollama
    model: "text-embedding-3-small"
    # 推荐中文场景使用 BGE-M3 (通过 Ollama):
    # provider: "ollama"
    # model: "bge-m3"               # 多语言 SOTA, 1024 维

auth:
  enabled: true
  # api_keys — 每个 key 绑定一个 team_id / Each key maps to a team_id
  # api_keys:
  #   - key: "your-secret-api-key-here"
  #     team_id: "default"

server:
  port: 8080
  auth_enabled: true

# Reflect 反思引擎配置 / Reflect engine configuration
reflect:
  max_rounds: 3
  token_budget: 4096
  round_timeout: 30s
  auto_save: false

# Extract 实体抽取配置 / Entity extraction configuration
extract:
  max_entities: 20
  max_relations: 30
  normalize_enabled: true
  normalize_candidates: 20
  timeout: 30s

# Retrieval 检索配置 / Retrieval configuration
retrieval:
  graph_enabled: true
  graph_depth: 1
  graph_weight: 0.8
  fts_weight: 1.0
  qdrant_weight: 1.0
  graph_fts_top: 5
  graph_entity_limit: 10
  access_alpha: 0.15     # 访问频率阻尼系数（0=不加权，越大越倾向高访问记忆）/ Access frequency damping (0=none)

  # MMR 多样性重排（需要 Qdrant，SQLite-only 自动跳过）/ MMR diversity re-ranking (requires Qdrant)
  mmr:
    enabled: false       # 开启后 RRF 结果再经 MMR 多样性重排 / Enable MMR after RRF
    lambda: 0.7          # 相关性 vs 多样性权衡：1.0=纯相关性，0.0=纯多样性 / Relevance(1.0) vs diversity(0.0)

  # 查询预处理 / Query preprocessing
  preprocess:
    enabled: true        # 开启关键词提取、意图识别 / Enable keyword extraction and intent detection
    use_llm: true        # 是否用 LLM 做语义改写（false=规则+词表）/ Use LLM for semantic rewrite
    llm_timeout: 5s      # LLM 预处理超时 / LLM preprocessing timeout
    stopword_files:
      - "config/stopwords_en.txt"
      - "config/stopwords_zh.txt"
    synonym_files:
      - "config/synonym_zh.txt"

# Scheduler 后台调度器 / Background scheduler
scheduler:
  enabled: false                       # 生产环境建议开启 / Recommended enabled in production
  cleanup_interval: 6h                 # 过期记忆清理间隔 / Expired memory cleanup interval
  access_flush_interval: 5m            # 访问计数批量写入间隔 / Access count flush interval
  consolidation_interval: 24h          # 记忆归纳间隔 / Memory consolidation interval

# Consolidation 记忆归纳 / Memory consolidation
consolidation:
  enabled: false                       # 需要 Qdrant + LLM / Requires Qdrant + LLM
  min_age_days: 30                     # 仅归纳 30 天以上的记忆 / Only consolidate memories older than 30 days
  similarity_threshold: 0.85           # 相似度阈值，越高簇越紧密 / Similarity threshold for clustering
  min_cluster_size: 3                  # 最小成簇数量 / Minimum cluster size
  max_memories_per_run: 200            # 每次最多处理记忆数 / Max memories processed per run

# Heartbeat 自主巡检引擎 / Autonomous inspection engine
heartbeat:
  enabled: false                       # 生产环境建议开启 / Recommended enabled in production
  interval: 6h                         # 巡检间隔 / Inspection interval
  contradiction_enabled: true          # 开启矛盾检测（需要 Qdrant + LLM）/ Enable contradiction detection
  contradiction_max_comparisons: 50    # 每次最多对比记忆对数量 / Max pairs per run
  decay_audit_min_age_days: 90         # 衰减审计：仅审计 90 天以上的记忆 / Min age for decay audit
  decay_audit_threshold: 0.1           # 衰减审计：强度低于此值触发警告 / Strength threshold for audit warning

# MCP 服务器配置 / MCP server configuration
mcp:
  enabled: false                   # 手动开启 / Opt-in
  port: 8081
  default_team_id: "default"
  default_owner_id: "mcp-user"

# Claude Code hooks 集成 / Claude Code hooks integration
hooks:
  enabled: false
  mcp_url: "http://localhost:8081"
  skip_tools: [Glob, Grep, ToolSearch, TaskCreate, TaskUpdate, TaskList, TaskGet, TodoWrite]
  max_input_chars: 1000
  max_output_chars: 500
  inject_limit: 20
  summary_limit: 50

# Document 文档处理配置 / Document processing configuration
document:
  enabled: false                        # 需要 docling/tika sidecar / Requires docling/tika sidecar
  max_concurrent: 3
  process_timeout: 10m
  max_file_size: 104857600              # 100MB
  cleanup_after_parse: true
  keep_images: true
  allowed_types: [pdf, docx, pptx, xlsx, md, html, txt, png, jpg, jpeg]
  file_store:
    provider: "local"
    local:
      base_dir: "./data/uploads"
  docling:
    url: "http://localhost:5001"
    timeout: 120s
  tika:
    url: "http://localhost:9998"
    timeout: 60s
  chunking:
    max_tokens: 512
    overlap_tokens: 50
    context_prefix: true
    keep_table_intact: true
    keep_code_intact: true
