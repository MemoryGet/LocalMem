version: "3.8"

services:
  iclude:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - iclude-data:/data
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      qdrant:
        condition: service_healthy
      docling:
        condition: service_started
      tika:
        condition: service_started

  docling:
    image: quay.io/docling-project/docling-serve:latest
    expose:
      - "5001"
    environment:
      - DOCLING_BACKEND=dlparse_v2
      - DOCLING_OCR_ENGINE=easyocr
    deploy:
      resources:
        limits:
          memory: 4G
    restart: unless-stopped

  tika:
    image: apache/tika:latest
    expose:
      - "9998"
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.7.4
    ports:
      - "6333:6333"     # 暴露到宿主机，供本地 go test 直接访问
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:6333/readyz"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # BGE-Reranker HTTP sidecar (Path B)
  # 启动方式: docker compose --profile reranker up -d
  # 或单独: docker compose up reranker -d
  reranker:
    image: python:3.11-slim
    profiles: ["reranker"]          # opt-in: 默认不启动，需要显式指定 profile
    ports:
      - "8868:8868"
    volumes:
      - ../tools/reranker_server.py:/app/reranker_server.py:ro
      - reranker-cache:/root/.cache  # HuggingFace 模型缓存（避免重复下载）
    environment:
      - RERANKER_MODEL=${RERANKER_MODEL:-BAAI/bge-reranker-v2-m3}
      - RERANKER_PORT=8868
    working_dir: /app
    command: >
      bash -c "pip install --quiet FlagEmbedding flask && python reranker_server.py"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8868/healthz"]
      interval: 10s
      timeout: 5s
      retries: 12          # 模型首次下载需要较长时间
      start_period: 120s
    restart: unless-stopped

volumes:
  iclude-data:
  qdrant-data:
  reranker-cache:
