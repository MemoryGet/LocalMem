version: "3.8"

services:
  iclude:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - iclude-data:/data
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      qdrant:
        condition: service_healthy
      docling:
        condition: service_started
      tika:
        condition: service_started

  docling:
    image: quay.io/docling-project/docling-serve:latest
    ports:
      - "5001:5001"
    environment:
      - DOCLING_BACKEND=dlparse_v2
      - DOCLING_OCR_ENGINE=easyocr
    deploy:
      resources:
        limits:
          memory: 4G
    restart: unless-stopped

  tika:
    image: apache/tika:latest
    ports:
      - "9998:9998"
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.7.4
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:6333/readyz"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  iclude-data:
  qdrant-data:
