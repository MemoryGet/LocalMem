# ============================================================
# LocalMem 普通版配置 / Standard Edition
# 适用：团队/项目使用，中文优化，图谱+推理
# 依赖：LLM API Key + Jieba 分词服务
# ============================================================

storage:
  sqlite:
    enabled: true
    path: "${DATA_DIR}/iclude.db"
    search:
      bm25_weights:
        content: 10.0
        abstract: 5.0
        summary: 3.0
    tokenizer:
      provider: jieba  # 精确中文分词
      jieba_url: "http://localhost:8866"
      stopword_files:
        - "config/stopwords_zh.txt"
        - "config/stopwords_en.txt"

  qdrant:
    enabled: false  # 普通版仅 SQLite，可手动开启

llm:
  default_provider: openai
  openai:
    api_key: "${OPENAI_API_KEY}"
    base_url: "${LLM_BASE_URL}"
    model: "${LLM_MODEL}"
  embedding:
    provider: openai
    model: "text-embedding-3-small"
  fallback:
    - name: "backup"
      base_url: "${FALLBACK_BASE_URL}"
      api_key: "${FALLBACK_API_KEY}"
      model: "${FALLBACK_MODEL}"

retrieval:
  graph_enabled: true  # 开启知识图谱
  graph_depth: 1
  fts_weight: 1.0
  qdrant_weight: 1.0
  graph_weight: 0.8
  graph_fts_top: 5
  graph_entity_limit: 10
  access_alpha: 0.15
  mmr:
    enabled: false
  preprocess:
    enabled: true
    use_llm: false  # 规则模式

extract:
  max_entities: 20
  max_relations: 30
  normalize_enabled: true
  normalize_candidates: 20
  timeout: 30s

reflect:
  max_rounds: 3
  token_budget: 4096
  round_timeout: 30s
  auto_save: true  # 推理结论自动保存

heartbeat:
  enabled: true
  interval: 6h
  contradiction_enabled: false  # 普通版不开矛盾检测
  decay_audit_min_age_days: 90
  decay_audit_threshold: 0.1

scheduler:
  enabled: true
  cleanup_interval: 6h
  access_flush_interval: 5m
  consolidation_interval: 24h

consolidation:
  enabled: false

document:
  enabled: false

server:
  port: 8080

mcp:
  enabled: true
  default_team_id: "${TEAM_ID}"
  default_owner_id: "${OWNER_ID}"
