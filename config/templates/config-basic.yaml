# ============================================================
# LocalMem 基础版配置 / Basic Edition
# 适用：个人本地使用，零外部依赖，开箱即用
# 依赖：仅需 LLM API Key
# ============================================================

storage:
  sqlite:
    enabled: true
    path: "${DATA_DIR}/iclude.db"
    search:
      bm25_weights:
        content: 10.0
        abstract: 5.0
        summary: 3.0
    tokenizer:
      provider: simple  # 内置分词，无外部依赖

  qdrant:
    enabled: false  # 基础版不启用向量检索

partitions:
  enabled: false
  catalog_path: "${DATA_DIR}/partitions.db"

llm:
  default_provider: openai
  openai:
    api_key: "${OPENAI_API_KEY}"
    base_url: "${LLM_BASE_URL}"  # 空=官方API，可填兼容API地址
    model: "${LLM_MODEL}"
  embedding:
    provider: openai
    model: "text-embedding-3-small"

auth:
  enabled: true

retrieval:
  graph_enabled: false  # 基础版不启用图谱
  fts_weight: 1.0
  qdrant_weight: 1.0
  graph_weight: 0.8
  access_alpha: 0.15
  mmr:
    enabled: false
  preprocess:
    enabled: true
    use_llm: false
    llm_timeout: 5s
    stopword_files:
      - "config/stopwords_en.txt"
      - "config/stopwords_zh.txt"

extract:
  max_entities: 10
  max_relations: 15
  normalize_enabled: false
  timeout: 30s

reflect:
  max_rounds: 2
  token_budget: 2048
  round_timeout: 30s
  auto_save: false

heartbeat:
  enabled: false

scheduler:
  enabled: true
  cleanup_interval: 6h
  access_flush_interval: 30s

consolidation:
  enabled: false

document:
  enabled: false

server:
  port: 8080
  auth_enabled: true

mcp:
  enabled: true
  default_team_id: "default"
  default_owner_id: "${OWNER_ID}"

hooks:
  enabled: false
  mcp_url: "http://localhost:8081"
  skip_tools: [Glob, Grep, ToolSearch, TaskCreate, TaskUpdate, TaskList, TaskGet, TodoWrite]
  max_input_chars: 1000
  max_output_chars: 500
  inject_limit: 20
  summary_limit: 50
